<!DOCTYPE html>
<html>
<head>
      <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1" charset="UTF-8"/>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/static/images/pikachu_icon.png">
    <script src="https://unpkg.com/htmx.org@1.9.2" defer></script>

    <Title>Battle</Title>
</head>
<body>

<h1>Batalha Pokémon!</h1>

<div id="battle-container">
    <div id="enemy">
        <div class="info">
            <span class="texto-retro" id="enemy-name">Enemy</span><br>
            <span class="texto-retro" id="enemy-level">Lv. 100</span>
            <div class="hp-bar"><div id="enemy-hp" class="hp-fill"></div></div>
        </div>
        <img id="enemy-pokemon" src="">
    </div>

    <div id="player">
        <div class="info">
            <span class="texto-retro" id="player-name">Player</span><br>
            <span class="texto-retro" id="player-level">Lv. 100</span>
            <div class="hp-bar"><div id="player-hp" class="hp-fill"></div></div>
        </div>
        <img id="player-pokemon" src="">
    </div>
</div>

<div id="battle-ui">
    <div id="battle-text">Carregando...</div>
    <div id="moves">
        <button class="move-btn" id="move1"></button>
        <button class="move-btn" id="move2"></button>
        <button class="move-btn" id="move3"></button>
        <button class="move-btn" id="move4"></button>
    </div>
</div>

<script>
class Pokemon {
    constructor(nome, level=50){
        this.nome = nome;
        this.level = level;
        this.hpMax = 0;
        this.hp = 0;
        this.attack = 0;
        this.defense = 0;
        this.speed = 0;
        this.moves = [];
        this.types = [];
    }

    async loadData(){
        const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${this.nome.toLowerCase()}`);
        const data = await res.json();
        const baseStats = {};
        data.stats.forEach(stat => baseStats[stat.stat.name] = stat.base_stat);
        this.hpMax = Math.floor((baseStats.hp*2*this.level)/100 + this.level +10);
        this.hp = this.hpMax;
        this.attack = Math.floor((baseStats.attack*2*this.level)/100 +5);
        this.defense = Math.floor((baseStats.defense*2*this.level)/100 +5);
        this.speed = Math.floor((baseStats.speed*2*this.level)/100 +5);
        this.types = data.types.map(t=>t.type.name);
    }

    calcularDano(target, moveIndex=0){
        const move = this.moves[moveIndex];
        const STAB = this.types.includes(move.type)?1.5:1;
        const effectiveness = getEffectiveness(move.type, target.types[0]);
        const random = 0.85 + Math.random()*0.15;

        const dano = Math.floor(
            ((2*this.level +2)*move.power*(this.attack/target.defense)/50 +2)
            * STAB * effectiveness * random / 1.5
        );

        target.receberDano(dano);

        return {
            dano,
            effectiveness,
            moveName: move.name   // <- adiciona isso
        };
    }

    receberDano(dano){
        this.hp -= dano;
        if(this.hp <0) this.hp = 0;
        this.atualizarBarraHP();
    }

    atualizarBarraHP(){
        const id = this.nome === player.nome ? "player-hp" : "enemy-hp";
        document.getElementById(id).style.width = `${(this.hp/this.hpMax)*100}%`;
    }
}

function getEffectiveness(moveType, targetType){
    const chart = {
        fire:{grass:2, water:0.5, fire:0.5},
        water:{fire:2, grass:0.5, water:0.5},
        grass:{water:2, fire:0.5, grass:0.5},
        electric:{water:2, electric:0.5, ground:0},
        normal:{ghost:0}
    };
    return chart[moveType]?.[targetType] || 1;
}

let player, enemy;

async function iniciarBatalha(){
    const playerNome = localStorage.getItem("selectedPokemon") || "pikachu";
    
    const selectedMoves = JSON.parse(localStorage.getItem("selectedMoves"));
    if(!selectedMoves || selectedMoves.length === 0){
        document.getElementById("battle-text").innerText = "Nenhum golpe selecionado! Volte ao build.";
        return;
    }

    const username = localStorage.getItem("username");
    const pokemonsTxt = await fetch("/static/last_evos_gen1_5.txt").then(r=>r.text());
    const pokemons = pokemonsTxt.split("\n").map(p=>p.trim().toLowerCase()).filter(p=>p);

    let enemyNome;
    do { enemyNome = pokemons[Math.floor(Math.random()*pokemons.length)]; }
    while(enemyNome===playerNome);

    player = new Pokemon(playerNome);
    enemy = new Pokemon(enemyNome);

    await player.loadData();
    await enemy.loadData();

    player.moves = await Promise.all(selectedMoves.map(async name=>{
        const res = await fetch(`https://pokeapi.co/api/v2/move/${name}`);
        const data = await res.json();
        return {name: data.name, power:data.power||40, type:data.type.name};
    }));

    const enemyData = await fetch(`https://pokeapi.co/api/v2/pokemon/${enemyNome}`).then(r=>r.json());
    enemy.moves = await Promise.all(enemyData.moves.sort(()=>0.5-Math.random()).slice(0,4).map(async m=>{
        const data = await fetch(m.move.url).then(r=>r.json());
        return {name:data.name, power:data.power||40, type:data.type.name};
    }));

    // atualiza html
    document.getElementById("player-name").innerText = player.nome;
    document.getElementById("player-pokemon").src = `https://img.pokemondb.net/sprites/black-white/anim/back-normal/${player.nome}.gif`;
    document.getElementById("enemy-name").innerText = enemy.nome;
    document.getElementById("enemy-pokemon").src = `https://img.pokemondb.net/sprites/black-white/anim/normal/${enemy.nome}.gif`;
    document.getElementById("battle-text").innerText = "Escolha seu ataque:";

    const moveBtns = document.querySelectorAll(".move-btn");
    moveBtns.forEach((b,i)=>{b.disabled=false; b.innerText = player.moves[i]?.name || "-";});

    moveBtns.forEach((btn, i)=>{
        btn.onclick = async ()=>{
            moveBtns.forEach(b=>b.disabled=true);
            await turno(player, enemy, i);
        };
    });
}

async function turno(fast, slow, moveIndex){
    let primeiro, segundo;
    if(player.speed >= enemy.speed){
        primeiro = player; segundo = enemy;
    } else {
        primeiro = enemy; segundo = player;
    }

    // ===== ATAQUE 1 =====
    const firstMoveIndex = primeiro === player ? moveIndex : Math.floor(Math.random()*primeiro.moves.length);
    let result = primeiro.calcularDano(segundo, firstMoveIndex);

    // animação
    let attackerImg = primeiro === player 
        ? document.getElementById("player-pokemon")
        : document.getElementById("enemy-pokemon");

    let targetImg = segundo === player 
        ? document.getElementById("player-pokemon")
        : document.getElementById("enemy-pokemon");

    attackerImg.classList.add(primeiro === player ? "attack-player" : "attack-enemy");

    setTimeout(() => {
        targetImg.classList.add("hit");
    }, 120);

    setTimeout(() => {
        attackerImg.classList.remove("attack-player", "attack-enemy");
        targetImg.classList.remove("hit");
    }, 300);

    let msg = `${primeiro.nome} usou ${result.moveName}! (${result.dano})`;
    if(result.effectiveness > 1) msg += "\nSuper efetivo!";
    else if(result.effectiveness < 1) msg += "\nNão muito efetivo...";

    document.getElementById("battle-text").innerText = msg;

    if(segundo.hp <= 0){
        document.getElementById("battle-text").innerText += `\n${primeiro.nome} venceu!`;
        fimBatalha(primeiro === player ? "player" : "enemy");
        return;
    }

    // ===== ATAQUE 2 =====
    const secondMoveIndex = segundo === player ? moveIndex : Math.floor(Math.random()*segundo.moves.length);
    result = segundo.calcularDano(primeiro, secondMoveIndex);

    // animação
    attackerImg = segundo === player 
        ? document.getElementById("player-pokemon")
        : document.getElementById("enemy-pokemon");

    targetImg = primeiro === player 
        ? document.getElementById("player-pokemon")
        : document.getElementById("enemy-pokemon");

    attackerImg.classList.add(segundo === player ? "attack-player" : "attack-enemy");

    setTimeout(() => {
        targetImg.classList.add("hit");
    }, 120);

    setTimeout(() => {
        attackerImg.classList.remove("attack-player", "attack-enemy");
        targetImg.classList.remove("hit");
    }, 300);

    msg = `${segundo.nome} usou ${result.moveName}! (${result.dano})`;
    if(result.effectiveness > 1) msg += "\nSuper efetivo!";
    else if(result.effectiveness < 1) msg += "\nNão muito efetivo...";

    document.getElementById("battle-text").innerText += "\n" + msg;

    if(primeiro.hp <= 0){
        document.getElementById("battle-text").innerText += `\n${segundo.nome} venceu!`;
        fimBatalha(segundo === player ? "player" : "enemy");
        return;
    }

    // turno acabou
    document.getElementById("battle-text").innerText += "\nEscolha seu ataque:";
    document.querySelectorAll(".move-btn").forEach(b => b.disabled = false);
}

function fimBatalha(vencedor){
    const username = localStorage.getItem("username");

    document.querySelectorAll(".move-btn").forEach(b=>b.disabled=true);

    // chama backend pra atualizar winstreak
    fetch("/update_winstreak", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            username: username,
            venceu: vencedor === "player"
        })
    });

    // botão voltar
    const btn = document.createElement("button");
    btn.innerText = "Voltar";
    btn.className = "move-btn";
    btn.style.marginTop = "10px";

    btn.onclick = () => window.location.href = "/selecao-pokemon?user=" + username;

    document.getElementById("battle-ui").appendChild(btn);
}

function firstMove(pokemon, index){return pokemon===player?index: Math.floor(Math.random()*pokemon.moves.length);}
function secondMove(pokemon){return Math.floor(Math.random()*pokemon.moves.length);}

iniciarBatalha();
</script>

</body>
</html>
