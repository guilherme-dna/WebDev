<!DOCTYPE html>
<html>
    <head>

    <link rel="stylesheet" href="/static/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1" charset="UTF-8"/>
    <link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/static/images/pikachu_icon.png">
    <script src="/static/scripts.js" defer></script>


    <title>Login</title>

    </head>

    <body>
    <h1>Pokemon Battle Simulator</h1>

    <div id="botoes">

        <button onclick="mostrarCadastro()">Criar conta</button>
        <button onclick="mostrarLogin()">Login</button>

        <div id="cadastro" style="display:none;">
            <h2>Criar Conta</h2>
            <form id="form-cadastro">
                <input type="text" id="cad-username" placeholder="Username" required>
                <input type="password" id="cad-password" placeholder="Password" required>
                <button type="submit">Cadastrar</button>
            </form>
        </div>

        <div id="login" style="display:none;">
            <h2>Login</h2>
            <form id="form-login">
                <input type="text" id="login-username" placeholder="Username" required>
                <input type="password" id="login-password" placeholder="Password" required>
                <button type="submit">Entrar</button>
            </form>
        </div>

    </div>

    </body>



</html>
